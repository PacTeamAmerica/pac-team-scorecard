<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PAC TEAM · Commercial Scorecard · FY2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8f8f8;color:#111;padding:24px;min-height:100vh}
  input{font-family:inherit}
  h1{font-size:20px;font-weight:600;color:#111;margin-bottom:4px}
  .meta{font-size:12px;color:#888;margin-bottom:20px;line-height:1.6}
  .rbar{display:flex;align-items:center;gap:8px;padding:9px 14px;background:#E1F5EE;border-radius:8px;margin-bottom:16px;flex-wrap:wrap;border:1px solid #b2dfdb}
  .live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#1D9E75;margin-right:5px;vertical-align:middle}
  /* Upload */
  .dz{border:1.5px dashed #ccc;border-radius:8px;padding:12px 16px;cursor:pointer;background:#fff;transition:border-color .15s;margin-bottom:16px}
  .dz:hover{border-color:#1D9E75}.dz.loaded{border-style:solid;border-color:#1D9E75;background:#f6fdf9}
  /* Tiles */
  .tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
  .tile{background:#fff;border-radius:10px;padding:14px 16px;border:1px solid #e8e8e8;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .tile-lbl{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .tile-val{font-size:20px;font-weight:600;color:#111}
  .tile-sub{font-size:10px;color:#aaa;margin-top:3px}
  /* Sections */
  .sec{background:#fff;border:1px solid #e8e8e8;border-radius:10px;overflow:hidden;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .sh{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:#fafafa;cursor:pointer;user-select:none;border-bottom:1px solid #f0f0f0}
  .sh:hover{background:#f4f4f4}
  /* Table */
  .thead{display:grid;padding:5px 16px;background:#fafafa;border-bottom:1px solid #f0f0f0}
  .thead span{font-size:10px;color:#999;font-weight:500}
  .thead span:not(:first-child){text-align:right}
  .ar{display:grid;padding:9px 16px;border-bottom:1px solid #f5f5f5;align-items:center;background:#fff}
  .ar:last-of-type{border-bottom:none}.ar:hover{background:#fafafa}
  .cl{display:flex;flex-direction:column;align-items:flex-end}
  .clb{font-size:9px;color:#aaa;margin-bottom:2px}
  .cv{font-size:12px;padding:4px 8px;background:#f5f5f5;border-radius:4px;color:#111}
  .cv.live{background:#E8F5E9;color:#1b5e20;font-weight:500}
  .cv.mu{color:#bbb}
  .cs{font-size:13px;font-weight:600;text-align:right;color:#111}
  /* Badges */
  .ns{font-size:9px;padding:1px 4px;border-radius:3px;font-weight:600;background:#E3F2FD;color:#1565c0;margin-right:3px}
  .po{font-size:9px;padding:1px 4px;border-radius:3px;font-weight:600;background:#E8F5E9;color:#2e7d32;margin-right:3px}
  .lt{font-size:9px;padding:1px 4px;border-radius:3px;font-weight:600;background:#E8F5E9;color:#2e7d32;margin-left:3px}
  .aib{font-size:9px;padding:1px 5px;border-radius:3px;background:#FFF8E1;color:#f57f17;font-weight:500;margin-top:2px;white-space:nowrap}
  .run{font-size:9px;padding:1px 5px;border-radius:3px;background:#f5f5f5;color:#777;margin-top:2px;white-space:nowrap}
  .pbg{font-size:9px;padding:1px 5px;border-radius:3px;background:#E8F5E9;color:#2e7d32;font-weight:500;margin-top:2px}
  .pbg0{background:#f5f5f5;color:#bbb}
  .xb{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:500;margin-top:2px;white-space:nowrap}
  .xb-p{background:#EDE7F6;color:#4527a0}.xb-b{background:#E3F2FD;color:#1565c0}.xb-g{background:#E8F5E9;color:#2e7d32}
  .bdg{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:500;white-space:nowrap}
  /* Monthly */
  .mo-wrap{padding:14px 16px 4px}
  .mo-stats{display:flex;gap:24px;margin-bottom:14px;flex-wrap:wrap}
  .mo-stat-val{font-size:18px;font-weight:600;color:#111}
  .mo-stat-lbl{font-size:10px;color:#999;margin-top:2px}
  .mo-tbl{width:100%;border-collapse:collapse;margin-bottom:4px}
  .mo-tbl th{font-size:10px;color:#999;font-weight:500;padding:5px 8px;border-bottom:1px solid #eee;text-align:right}
  .mo-tbl th:first-child{text-align:left}
  .mo-tbl td{font-size:12px;padding:7px 8px;border-bottom:1px solid #f5f5f5;text-align:right;vertical-align:middle}
  .mo-tbl td:first-child{text-align:left;font-weight:500}
  .mo-tbl tr:last-child td{border-bottom:none;font-weight:600;border-top:1px solid #ddd;padding-top:8px}
  .mo-tbl tr:hover td{background:#fafafa}
  .bar-wrap{width:80px;height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:8px}
  .bar-fill{height:100%;border-radius:3px;background:#bbb}
  .bar-fill.hi{background:#1D9E75}
  .partial-tag{font-size:9px;padding:1px 4px;border-radius:3px;background:#FFF3E0;color:#e65100;font-weight:500;margin-left:5px}
  /* Target inputs */
  .ti{font-size:12px;padding:5px 8px;border:1px solid #e0e0e0;border-radius:4px;background:#fff;color:#111;width:100%}
  .ni{font-size:11px;text-align:right;padding:4px 6px;border:1px solid #e0e0e0;border-radius:4px;background:#fff;color:#111;width:100%}
  .ni:focus,.ti:focus{outline:none;border-color:#BA7517}
  .addbt{width:100%;padding:9px;cursor:pointer;background:none;border:none;border-top:1px solid #f0f0f0;font-size:12px;color:#888;display:flex;align-items:center;justify-content:center;gap:5px}
  .addbt:hover{background:#fafafa}
  .db{background:none;border:1px solid #e0e0e0;border-radius:4px;cursor:pointer;color:#bbb;font-size:11px;padding:2px 6px}
  .db:hover{color:#c62828;border-color:#ef9a9a}
  .sn{padding:8px 16px;font-size:10px;color:#aaa;border-top:1px solid #f5f5f5;line-height:1.7;background:#fafafa}
  .em{padding:16px;font-size:12px;color:#bbb;text-align:center}
  /* Footer */
  .footer{margin-top:24px;padding:12px 0;font-size:10px;color:#bbb;text-align:center;border-top:1px solid #eee}
  @media(max-width:700px){
    .tiles{grid-template-columns:1fr 1fr}
    .mo-stats{gap:14px}
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState,useEffect,useCallback,useRef,Fragment}=React;
const h=React.createElement;

// ── CONFIG ────────────────────────────────────────────────────────
const KEY=['Citizen Watch Co.','Seiko Holdings Group','The Swatch Group'];
const GROWTH=['Tapestry','Thelios','Timex Group','A. Jaffe','Tiffany & Co.','The Jewelry Group',
              'Bedrock Manufacturing (Shinola)','HexaClad','Kate Spade','Luxottica','Pandora','Marcolin'];
const BRANDS={
  'Citizen Watch Co.':'Citizen (all regions) · Caravelle · Alpina · Accutron · Bulova · Frederique Constant',
  'Seiko Holdings Group':'Grand Seiko · Seiko (Japan, Korea, Americas)',
  'The Swatch Group':'Harry Winston','Tapestry':'Coach · Kate Spade',
  'Bedrock Manufacturing (Shinola)':'Shinola',
  'Kate Spade':'Sub-brand of Tapestry  ·  no separate NetSuite entity',
  'Marcolin':'Marcolin USA Eyewear Corp.','A. Jaffe':'Events business',
};
const ASSESS={
  'Citizen Watch Co.':'DEFEND','Seiko Holdings Group':'BUILD','The Swatch Group':'DEFEND',
  'Tapestry':'BUILD','Thelios':'FIX','Timex Group':'FIX','A. Jaffe':'BUILD',
  'Tiffany & Co.':'SCALE','The Jewelry Group':'FIX','Bedrock Manufacturing (Shinola)':'FIX',
  'HexaClad':'—','Kate Spade':'—','Luxottica':'—','Pandora':'—','Marcolin':'—',
};
const BDGCLR={
  DEFEND:{bg:'#E8F5E9',cl:'#2e7d32'},SCALE:{bg:'#E3F2FD',cl:'#1565c0'},
  BUILD:{bg:'#EDE7F6',cl:'#4527a0'},FIX:{bg:'#FFF8E1',cl:'#f57f17'},
};
const ANNUALIZE=365/146;
const NS_DATE='May 26, 2026';
const YTD_LABEL='Jan 1\u2013May 26, 2026';

// ── NETSUITE DATA — queried May 20, 2026 ─────────────────────────
// Invoiced YTD: fiscal YTD Jan 1–May 20, 2026
// Open orders: amountUnbilled (remaining balance only — no double counting)
//   Backlog = status D/F (confirmed, not yet shipped)
//   Awaiting Invoice = status B/E (shipped, not yet billed)
const NS_LIVE={
  'Citizen Watch Co.':               {inv:4980302,  backlog:1187755, awaitInv:3438185},
  'Seiko Holdings Group':            {inv:338289,   backlog:140328,  awaitInv:590134},
  'The Swatch Group':                {inv:354300,   backlog:0,       awaitInv:441042},
  'Tapestry':                        {inv:36672,    backlog:0,       awaitInv:0},
  'Thelios':                         {inv:168075,   backlog:31416,   awaitInv:55146},
  'Timex Group':                     {inv:257580,   backlog:1732,    awaitInv:58381},
  'A. Jaffe':                        {inv:152739,   backlog:0,       awaitInv:196781},
  'Tiffany & Co.':                   {inv:57499,    backlog:860,     awaitInv:384664},
  'The Jewelry Group':               {inv:233300,   backlog:13800,   awaitInv:132142},
  'Bedrock Manufacturing (Shinola)': {inv:65603,    backlog:0,       awaitInv:104120},
  'HexaClad':                        {inv:0,        backlog:0,       awaitInv:0},
  'Kate Spade':                      {inv:0,        backlog:0,       awaitInv:0},
  'Luxottica':                       {inv:12971,    backlog:0,       awaitInv:36242},
  'Pandora':                         {inv:0,        backlog:0,       awaitInv:0},
  'Marcolin':                        {inv:0,        backlog:0,       awaitInv:0},
};

// Month-by-month active client count from SuiteQL
const MONTHLY=[
  {month:'January',  clients:25, invoiced:1688922, partial:false},
  {month:'February', clients:20, invoiced:1222166, partial:false},
  {month:'March',    clients:21, invoiced:1309440, partial:false},
  {month:'April',    clients:27, invoiced:2416534, partial:false},
  {month:'May',      clients:21, invoiced:891596,  partial:true},
];
const YTD_UNIQUE=50;
const TRAILING_12M=66;

// ── PODIO MAPPING ─────────────────────────────────────────────────
const PODIO_MAP={
  'Citizen Watch of America':'Citizen Watch Co.','Citizen Watch Company of Canada':'Citizen Watch Co.',
  'Citizen Watch United Kingdom':'Citizen Watch Co.','Bulova':'Citizen Watch Co.',
  'Caravelle':'Citizen Watch Co.','ACCUTRON':'Citizen Watch Co.','Accutron':'Citizen Watch Co.',
  'Frederique Constant':'Citizen Watch Co.','Alpina':'Citizen Watch Co.',
  'Grand Seiko':'Seiko Holdings Group','SWC - Grand Seiko':'Seiko Holdings Group',
  'SWC - Seiko':'Seiko Holdings Group','Seiko':'Seiko Holdings Group',
  'Harry Winston':'The Swatch Group','Tapestry/Coach':'Tapestry','Coach':'Tapestry',
  'Kate Spade':'Kate Spade','Th\u00e9lios':'Thelios','Thelios':'Thelios',
  'Timex':'Timex Group','Timex Group':'Timex Group','TIFFANY & Co.':'Tiffany & Co.',
  'Shinola':'Bedrock Manufacturing (Shinola)','A.Jaffe':'A. Jaffe','A. Jaffe':'A. Jaffe',
  'HexaClad':'HexaClad','Luxottica':'Luxottica','Pandora':'Pandora','Marcolin':'Marcolin',
};
const wt=p=>+p>=80?1:+p>=50?0.5:0;
const mapP=c=>PODIO_MAP[(c||'').trim()]||(c||'').trim();
const parsePodio=buf=>{
  const wb=XLSX.read(buf,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
  const active=new Set(['In Progress','On Hold','Opportunity']);const pipe={};const cls=new Set();
  for(const r of rows){
    if(!active.has(r['Status']))continue;
    const cl=(r['Client']||'').trim();const est=parseFloat(r['Estimate value - amount'])||0;const prob=parseFloat(r['Probability'])||0;
    if(!cl||est<=0)continue;cls.add(cl);const co=mapP(cl);const w=wt(prob);
    if(!pipe[co])pipe[co]={wtd:0,n:0,c:0};pipe[co].wtd+=est*w;pipe[co].n++;if(w>0)pipe[co].c++;
  }
  return{pipe,cc:cls.size};
};

// ── FORMATTERS ────────────────────────────────────────────────────
const fmt=v=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(+v||0);
const fmtS=v=>{const n=Math.abs(+v||0);if(!n)return '$0';if(n>=1e6)return '$'+(n/1e6).toFixed(1)+'M';if(n>=1e3)return '$'+(n/1e3).toFixed(0)+'K';return '$'+Math.round(n).toLocaleString();};
const uid=()=>Math.random().toString(36).slice(2,7);

// ── COMPONENTS ────────────────────────────────────────────────────
function Bdg({label}){
  if(!label||label==='—')return null;
  const s=BDGCLR[label]||{bg:'#f5f5f5',cl:'#777'};
  return h('span',{className:'bdg',style:{background:s.bg,color:s.cl}},label);
}

function UploadCard({state,err,onFile,onClear}){
  const ref=useRef();
  return h('div',{className:`dz${state?' loaded':''}`,
    onClick:()=>ref.current.click(),onDragOver:e=>e.preventDefault(),
    onDrop:e=>{e.preventDefault();const f=e.dataTransfer.files?.[0];if(f)onFile(f);}},
    h('input',{ref,type:'file',accept:'.xlsx,.xls',style:{display:'none'},
      onChange:e=>{const f=e.target.files?.[0];if(f)onFile(f);e.target.value=''}}),
    h('div',{style:{display:'flex',alignItems:'center',gap:12}},
      h('div',{style:{width:36,height:36,borderRadius:8,background:state?'#1D9E75':'#ddd',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:18,color:'#fff',fontWeight:300}},state?'✓':'↑'),
      h('div',{style:{minWidth:0,flex:1}},
        h('div',{style:{fontSize:13,fontWeight:600,color:'#111',marginBottom:2}},
          h('span',{className:'po'},'Podio'),'Active Projects Export',
          h('span',{style:{fontSize:9,padding:'1px 6px',borderRadius:3,background:'#E3F2FD',color:'#1565c0',fontWeight:600,marginLeft:8}},'Upload weekly')
        ),
        state
          ?h('div',{style:{display:'flex',alignItems:'center',gap:10,marginTop:2}},
              h('span',{style:{fontSize:11,color:'#1D9E75'}},'\u2713 '+state.name+' \u00b7 '+state.date+' \u00b7 pipeline loaded \u00b7 saved in browser'),
              h('button',{
                style:{fontSize:10,padding:'2px 8px',border:'1px solid #e0e0e0',borderRadius:3,background:'#fff',color:'#888',cursor:'pointer',flexShrink:0,marginLeft:4},
                onClick:e=>{e.stopPropagation();onClear();}
              },'clear')
            )
          :h('div',{style:{fontSize:11,color:'#aaa'}},'Drag & drop or click  ·  Podio .Projects export (In Progress / On Hold / Opportunity)  ·  .xlsx  ·  \ud83d\udcbe remembered across page refreshes'),
        err&&h('div',{style:{fontSize:11,color:'#c62828',marginTop:3}},'⚠ '+err)
      )
    )
  );
}

function Sec({title,def,dot,total,open,onToggle,children}){
  return h('div',{className:'sec'},
    h('div',{className:'sh',onClick:onToggle},
      h('div',{style:{display:'flex',alignItems:'center',gap:8}},
        h('div',{style:{width:8,height:8,borderRadius:'50%',background:dot,flexShrink:0}}),
        h('span',{style:{fontSize:14,fontWeight:600,color:'#111'}},' '+title),
        h('span',{style:{fontSize:11,color:'#aaa',marginLeft:4}},def)
      ),
      h('div',{style:{display:'flex',alignItems:'center',gap:10}},
        h('span',{style:{fontSize:14,fontWeight:600,color:'#111'}},fmt(total)),
        h('span',{style:{fontSize:13,display:'inline-block',transition:'transform .15s',transform:open?'rotate(180deg)':'none',color:'#aaa'}},'⌄')
      )
    ),
    open&&h('div',null,children)
  );
}

function Thead({cols,labels}){
  return h('div',{className:'thead',style:{display:'grid',gridTemplateColumns:cols,gap:4}},
    ...labels.map((l,i)=>h('span',{key:i,style:{textAlign:i>0?'right':'left'}},l))
  );
}

const KCOLS='minmax(0,1.4fr) 108px 98px 98px 114px 78px';
const TCOLS='minmax(0,2fr) 110px 110px 80px 28px';

function ARow({co,podio}){
  const ns=NS_LIVE[co]||{inv:0,backlog:0,awaitInv:0};
  const pw=podio?.pipe?.[co]?.wtd||0;const pi=podio?.pipe?.[co]||null;
  const score=ns.inv+ns.backlog+ns.awaitInv+pw;
  const ann=Math.round(ns.inv*ANNUALIZE);
  const am=ASSESS[co];
  return h('div',{className:'ar',style:{gridTemplateColumns:KCOLS}},
    h('div',{style:{minWidth:0}},
      h('div',{style:{fontSize:13,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'#111'}},co),
      BRANDS[co]&&h('div',{style:{fontSize:10,color:'#aaa',marginTop:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},BRANDS[co]),
      h('div',{style:{display:'flex',gap:3,marginTop:3,alignItems:'center',flexWrap:'wrap'}},
        am&&h(Fragment,null,h('span',{style:{fontSize:9,color:'#aaa'}},'AM:'),h(Bdg,{label:am})),
        co==='HexaClad'&&h('span',{className:'xb xb-p'},'reactivated May 2026'),
        (co==='Pandora'||co==='Marcolin'||co==='Luxottica')&&h('span',{className:'xb xb-p'},'new · May 2026'),
        co==='Kate Spade'&&h('span',{className:'xb xb-b'},'no NS entity'),
        co==='A. Jaffe'&&h('span',{className:'xb xb-g'},'events business')
      )
    ),
    h('div',{className:'cl'},
      h('div',{className:'clb'},h('span',{className:'ns'},'NS'),'invoiced YTD',h('span',{className:'lt'},'live')),
      h('div',{className:'cv live'},fmt(ns.inv)),
      ns.inv>0&&h('span',{className:'run'},'~'+fmtS(ann)+' ann.')
    ),
    h('div',{className:'cl'},
      h('div',{className:'clb'},h('span',{className:'ns'},'NS'),'backlog',h('span',{className:'lt'},'live')),
      h('div',{className:'cv live'},fmt(ns.backlog))
    ),
    h('div',{className:'cl'},
      h('div',{className:'clb'},h('span',{className:'ns'},'NS'),'awaiting inv.',h('span',{className:'lt'},'live')),
      h('div',{className:'cv live'},fmt(ns.awaitInv)),
      ns.awaitInv>0&&h('span',{className:'aib'},'shipped · unbilled')
    ),
    h('div',{className:'cl'},
      h('div',{className:'clb'},h('span',{className:'po'},'Podio'),'wtd pipeline'),
      h('div',{className:'cv'+(podio?'':' mu')},podio?fmt(pw):'— upload file'),
      podio&&h('span',{className:'pbg'+(!pi||!pi.n?' pbg0':'')},(!pi||!pi.n)?'no projects':`${pi.c}/${pi.n} projects`)
    ),
    h('div',{style:{textAlign:'right'}},
      h('div',{style:{fontSize:9,color:'#aaa',marginBottom:3}},'score'),
      h('div',{className:'cs'},fmtS(score))
    )
  );
}

function TRow({t,onChange,onDel}){
  const sc=(+t.won||0)+(+t.pipe||0);
  return h('div',{className:'ar',style:{gridTemplateColumns:TCOLS}},
    h('input',{type:'text',className:'ti',value:t.name,placeholder:'Prospect / account name',onChange:e=>onChange('name',e.target.value)}),
    h('div',{className:'cl'},h('div',{className:'clb'},h('span',{className:'ns'},'NS'),'new biz won'),h('input',{type:'number',className:'ni',value:t.won||'',placeholder:'0',onChange:e=>onChange('won',e.target.value)})),
    h('div',{className:'cl'},h('div',{className:'clb'},h('span',{className:'po'},'Podio'),'wtd pipeline'),h('input',{type:'number',className:'ni',value:t.pipe||'',placeholder:'0',onChange:e=>onChange('pipe',e.target.value)})),
    h('div',{style:{textAlign:'right'}},h('div',{style:{fontSize:9,color:'#aaa',marginBottom:3}},'score'),h('div',{className:'cs'},fmtS(sc))),
    h('button',{className:'db',onClick:onDel},'×')
  );
}

function MonthlySection(){
  const maxC=Math.max(...MONTHLY.map(m=>m.clients));
  const totalInv=MONTHLY.reduce((s,m)=>s+m.invoiced,0);
  return h('div',null,
    h('div',{className:'mo-wrap'},
      h('div',{className:'mo-stats'},
        h('div',null,h('div',{className:'mo-stat-val'},YTD_UNIQUE,h('span',{className:'lt',style:{marginLeft:5,verticalAlign:'middle'}},'live')),h('div',{className:'mo-stat-lbl'},'unique clients FY2026 YTD')),
        h('div',null,h('div',{className:'mo-stat-val'},fmt(totalInv)),h('div',{className:'mo-stat-lbl'},'total invoiced FY2026 YTD')),
        h('div',null,h('div',{className:'mo-stat-val'},'~'+fmtS(Math.round(totalInv*ANNUALIZE))),h('div',{className:'mo-stat-lbl'},'annualized run rate')),
        h('div',null,h('div',{className:'mo-stat-val'},TRAILING_12M),h('div',{className:'mo-stat-lbl'},'trailing 12M (CEO scorecard metric)'))
      ),
      h('table',{className:'mo-tbl'},
        h('thead',null,h('tr',null,
          h('th',{style:{textAlign:'left'}},'Month'),
          h('th',null,'Unique clients'),
          h('th',null,'Invoiced'),
          h('th',{style:{textAlign:'left',paddingLeft:16}},'Volume')
        )),
        h('tbody',null,
          ...MONTHLY.map(m=>h('tr',{key:m.month},
            h('td',{style:{textAlign:'left'}},m.month,m.partial&&h('span',{className:'partial-tag'},'partial')),
            h('td',null,h('span',{style:{fontWeight:m.clients===maxC?700:400,color:m.clients===maxC?'#1D9E75':'#111'}},m.clients)),
            h('td',null,fmt(m.invoiced)),
            h('td',{style:{textAlign:'left',paddingLeft:16}},
              h('div',{className:'bar-wrap'},
                h('div',{className:'bar-fill'+(m.clients===maxC?' hi':''),style:{width:(m.clients/maxC*100)+'%'}})
              )
            )
          )),
          h('tr',null,
            h('td',{style:{textAlign:'left'}},'YTD Total'),
            h('td',null,YTD_UNIQUE,' unique'),
            h('td',null,fmt(totalInv)),
            h('td',null)
          )
        )
      )
    ),
    h('div',{className:'sn'},
      'Unique clients per month = distinct billing entities invoiced that month  ·  YTD unique (',YTD_UNIQUE,') = distinct entities invoiced at least once Jan\u2013May 20  ·  ',
      'Monthly counts do not add to ',YTD_UNIQUE,' — same client can appear in multiple months  ·  May is partial through May 20  ·  ',
      'Trailing 12M count (',TRAILING_12M,') is the CEO scorecard definition metric'
    )
  );
}

// ── LOCALSTORAGE HELPERS ──────────────────────────────────────────
const LS_PODIO='pt_sc_podio_v1';
const LS_TARGETS='pt_sc_targets_v1';
const lsGet=k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}};
const lsSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}};
const lsClear=k=>{try{localStorage.removeItem(k);}catch(e){}};

// ── APP ───────────────────────────────────────────────────────────
function App(){
  const[podio,setPodio]=useState(()=>lsGet(LS_PODIO));
  const[targets,setTargets]=useState(()=>lsGet(LS_TARGETS)||[]);
  const[secs,setSecs]=useState({k:true,g:true,t:false,c:true});
  const[err,setErr]=useState(null);

  const saveT=u=>{setTargets(u);lsSet(LS_TARGETS,u);};

  const handleFile=useCallback((file)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const buf=new Uint8Array(e.target.result);
        const ts=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
        const parsed=parsePodio(buf);
        const data={...parsed,name:file.name,date:ts};
        setPodio(data);
        lsSet(LS_PODIO,data);
        setErr(null);
      }catch(e){
        if(e.message&&!e.message.includes('storage'))setErr(e.message);
      }
    };
    reader.readAsArrayBuffer(file);
  },[]);

  const clearPodio=useCallback(()=>{setPodio(null);lsClear(LS_PODIO);},[]);
  const tog=k=>setSecs(s=>({...s,[k]:!s[k]}));
  const keyT=KEY.reduce((s,co)=>{const ns=NS_LIVE[co]||{};return s+(ns.inv||0)+(ns.backlog||0)+(ns.awaitInv||0)+(podio?.pipe?.[co]?.wtd||0);},0);
  const grwT=GROWTH.reduce((s,co)=>{const ns=NS_LIVE[co]||{};return s+(ns.inv||0)+(ns.backlog||0)+(ns.awaitInv||0)+(podio?.pipe?.[co]?.wtd||0);},0);
  const tgtT=targets.reduce((s,t)=>s+(+t.won||0)+(+t.pipe||0),0);

  return h('div',{style:{maxWidth:1100,margin:'0 auto'}},
    h('h1',null,h('span',{className:'live-dot'}),'PAC TEAM  ·  Commercial Scorecard  ·  FY 2026'),
    h('div',{className:'meta'},
      'Invoiced YTD: '+YTD_LABEL+'  ·  Open orders: amountUnbilled (no double counting)  ·  Pipeline: \u226580% = 1.0\u00d7  ·  50\u201379% = 0.5\u00d7  ·  <50% = excluded'
    ),
    h('div',{className:'rbar'},
      h('span',{className:'live-dot'}),
      h('span',{style:{fontSize:12,fontWeight:600,color:'#1b5e20'}},'NetSuite data queried live — '+NS_DATE),
      h('span',{style:{fontSize:12,color:'#555'}},'·  Invoiced YTD  ·  Confirmed Backlog  ·  Awaiting Invoice — all from live SuiteQL'),
      h('span',{style:{fontSize:12,color:'#888'}},'·  Upload Podio export below to refresh pipeline  ·  Ask Claude to re-query NS monthly')
    ),
    h(UploadCard,{state:podio,err,onFile:handleFile,onClear:clearPodio}),
    h('div',{className:'tiles'},
      ...[
        {dot:'#1D9E75',l:'Key accounts',v:fmtS(keyT),s:KEY.length+' holding groups  ·  > $800K'},
        {dot:'#534AB7',l:'Strategic growth',v:fmtS(grwT),s:GROWTH.length+' accounts'},
        {dot:'#BA7517',l:'Strategic targets',v:targets.length?fmtS(tgtT):'—',s:targets.length?targets.length+' prospects':'Add below'},
        {dot:'#888780',l:'Active client count',v:String(TRAILING_12M),s:'unique invoiced · trailing 12M'},
      ].map(({dot,l,v,s})=>h('div',{key:l,className:'tile',style:{borderTop:'3px solid '+dot}},
        h('div',{className:'tile-lbl'},l),
        h('div',{className:'tile-val'},v),
        h('div',{className:'tile-sub'},s)
      ))
    ),
    h(Sec,{title:'Existing key accounts',def:'> $800K  ·  3 holding groups',dot:'#1D9E75',total:keyT,open:secs.k,onToggle:()=>tog('k')},
      h(Thead,{cols:KCOLS,labels:['holding company  /  brands','invoiced YTD  ·  ann.','backlog','awaiting inv.','wtd pipeline','score']}),
      ...KEY.map(co=>h(ARow,{key:co,co,podio})),
      h('div',{className:'sn'},'Invoiced YTD = '+YTD_LABEL+'  ·  Open orders = amountUnbilled only  ·  Tiers based on trailing 12M classification  ·  Score = Invoiced + Backlog + Awaiting Invoice + Wtd Pipeline')
    ),
    h(Sec,{title:'Strategic growth accounts',def:GROWTH.length+' accounts  ·  FY2026 YTD',dot:'#534AB7',total:grwT,open:secs.g,onToggle:()=>tog('g')},
      h(Thead,{cols:KCOLS,labels:['account  /  brands','invoiced YTD  ·  ann.','backlog','awaiting inv.','wtd pipeline','score']}),
      ...GROWTH.map(co=>h(ARow,{key:co,co,podio})),
      h('div',{className:'sn'},'A. Jaffe: BUILD — events business  ·  HexaClad: reactivated May 2026, $0 invoiced this window — open SO in awaiting invoice  ·  Kate Spade: no NS entity, tracked via Podio only')
    ),
    h(Sec,{title:'Strategic target accounts',def:'Prospects  ·  $800K+ annual potential',dot:'#BA7517',total:tgtT,open:secs.t,onToggle:()=>tog('t')},
      targets.length>0&&h(Thead,{cols:TCOLS,labels:['account','new biz won','wtd pipeline','score','']}),
      targets.length===0&&h('div',{className:'em'},'No strategic targets added yet'),
      ...targets.map(t=>h(TRow,{key:t.id,t,onChange:(f,v)=>saveT(targets.map(x=>x.id===t.id?{...x,[f]:v}:x)),onDel:()=>saveT(targets.filter(x=>x.id!==t.id))})),
      h('button',{className:'addbt',onClick:()=>saveT([...targets,{id:uid(),name:'',won:'',pipe:''}])},'+ add target account'),
      h('div',{className:'sn'},'New biz won + pipeline entered manually  ·  Pull from Podio .CRM Prospects app')
    ),
    h('div',{className:'sec'},
      h('div',{className:'sh',onClick:()=>tog('c')},
        h('div',{style:{display:'flex',alignItems:'center',gap:8}},
          h('div',{style:{width:8,height:8,borderRadius:'50%',background:'#888780',flexShrink:0}}),
          h('span',{style:{fontSize:14,fontWeight:600,color:'#111'}},' Active client count'),
          h('span',{style:{fontSize:11,color:'#aaa',marginLeft:4}},'FY2026 month-by-month  ·  live NS')
        ),
        h('div',{style:{display:'flex',alignItems:'center',gap:10}},
          h('span',{style:{fontSize:14,fontWeight:600,color:'#111'}},YTD_UNIQUE,' YTD'),
          h('span',{style:{fontSize:13,display:'inline-block',transition:'transform .15s',transform:secs.c?'rotate(180deg)':'none',color:'#aaa'}},'⌄')
        )
      ),
      secs.c&&h(MonthlySection)
    ),
    h('div',{className:'footer'},
      'PAC TEAM GROUP  ·  Commercial Scorecard  ·  FY2026  ·  NetSuite data queried '+NS_DATE+'  ·  ',
      'To refresh: ask Claude to re-query NetSuite and generate a new HTML file, then replace this file in GitHub'
    )
  );
}
ReactDOM.render(h(App),document.getElementById('root'));
</script>
</body>
</html>
